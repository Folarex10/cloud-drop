version: "3.9"

services:

  frontend:
    build: ./frontend
    container_name: clouddrop_frontend
    restart: always

  backend:
    build: ./backend
    container_name: clouddrop_backend
    env_file:
      - .env
    restart: always

  nginx:
    image: nginx:latest
    container_name: clouddrop_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend